name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar la compilación manualmente desde la web

jobs:
  build:
    name: Compilar APK en la Nube
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Descargar Código desde GitHub
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar Dependencias de Node
        run: npm install

      - name: Sincronizar Assets Web con Capacitor
        run: |
          npx cap doctor > cap_doctor.log 2>&1 || true
          npx cap sync android --verbose > cap_sync.log 2>&1

      - name: Registrar Logs en Servidor de Alertas al Fallar
        if: failure()
        run: |
          LOG_CONTENT="=== CAPACITOR DOCTOR ===\n$(cat cap_doctor.log | tail -n 100)\n\n=== CAPACITOR SYNC ===\n$(cat cap_sync.log | tail -n 200)"
          JSON_PAYLOAD=$(jq -n --arg desc "$LOG_CONTENT" '{type: "EVASION", description: $desc}')
          curl -X POST -H "Content-Type: application/json" -d "$JSON_PAYLOAD" https://control-parental-server.onrender.com/api/alert

      - name: Compilar Proyecto de Android (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Compilada como Artefacto de Descarga
        uses: actions/upload-artifact@v4
        with:
          name: ControlParental-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
