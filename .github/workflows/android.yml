name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar la compilación manualmente desde la web

jobs:
  build:
    name: Compilar APK en la Nube
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Descargar Código desde GitHub
        uses: actions/checkout@v4

      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependencias de Node
        run: npm install

      - name: Sincronizar Assets Web con Capacitor
        run: |
          npx cap doctor > cap_doctor.log 2>&1 || true
          npx cap sync --verbose > cap_sync.log 2>&1

      - name: Registrar Logs en Git en Caso de Fallo
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b build-logs-${{ github.run_id }}
          git add cap_doctor.log cap_sync.log || true
          git commit -m "ci: registrar logs de depuracion para ejecucion ${{ github.run_id }}"
          git push origin build-logs-${{ github.run_id }}

      - name: Compilar Proyecto de Android (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK Compilada como Artefacto de Descarga
        uses: actions/upload-artifact@v4
        with:
          name: ControlParental-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
